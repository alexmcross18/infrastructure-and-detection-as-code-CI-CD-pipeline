name: Deploy LAW and Sentinel (Terraform)

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client to deploy to (must match GitHub Environment name)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      # Same OIDC login you already use
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/Log-Analytics-Workspace-Sentinel-Terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/Log-Analytics-Workspace-Sentinel-Terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform plan -var-file="client-variables/${{ inputs.client }}.tfvars"

      - name: Terraform Apply
        working-directory: infrastructure/Log-Analytics-Workspace-Sentinel-Terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform apply -auto-approve -var-file="client-variables/${{ inputs.client }}.tfvars"
