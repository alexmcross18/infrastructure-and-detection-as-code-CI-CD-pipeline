name: Deploy Entra ID Logs

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client to deploy to (must match GitHub Environment name)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Deploy Logs
        run: |
          az deployment tenant create \
            --template-file infrastructure/Logs/Entra-ID-Logs.bicep \
            --location ${{ vars.AZURE_LOCATION }} \
            --parameters lawResourceId=${{ vars.LAW_RESOURCE_ID }}
