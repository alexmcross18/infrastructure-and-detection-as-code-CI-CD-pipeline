name: Deploy Watchlist to Sentinel

on: 
    workflow_dispatch:
        inputs:
            client:
                description: 'Client to deploy to (must match GitHub Environment name)'
                required: true
                type: string

jobs:
    deploy:
      runs-on: ubuntu-latest
      environment: ${{ inputs.client }}
      permissions:
          id-token: write
          contents: read

      steps:
          - name: Checkout Repo
            uses: actions/checkout@v4

          - name: Login to Azure
            uses: azure/login@v2
            with:
              client-id: ${{ vars.AZURE_CLIENT_ID }}
              tenant-id: ${{ vars.AZURE_TENANT_ID }}
              subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

          - name: Install Sentinel Extension
            run: az extension add --name sentinel --allow-preview true

          - name: Deploy Watchlist
            run: |
              az sentinel watchlist create \
                --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
                --workspace-name ${{ vars.AZURE_WORKSPACE }} \
                --watchlist-alias knownLocations \
                --display-name "Known Locations" \
                --items-search-key CountryCode \
                --provider Microsoft \
                --source "known_signin_locations.csv" \
                --raw-content @watchlists/known_signin_locations.csv \
                --content-type "text/csv"
