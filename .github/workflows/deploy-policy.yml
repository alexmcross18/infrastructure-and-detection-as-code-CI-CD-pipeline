name: Deploy Azure Policy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/Azure-Policy-as-Code/**.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate template
        run: |
          for file in infrastructure/Azure-Policy-as-Code/*.json; do
            echo "Validating $file"
            az deployment sub validate \
            --location uksouth \
            --template-file "$file" \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }}
          done

      - name: Deploy detection
        if: github.event_name == 'workflow_dispatch'
        run: |
          for file in infrastructure/Azure-Policy-as-Code/*.json; do
            echo "Deploying $file"
            az deployment sub create \
            --location uksouth \
            --template-file "$file" \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }}
          done
