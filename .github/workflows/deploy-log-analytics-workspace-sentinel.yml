name: Deploy Log Analytics Workspace and Sentinel
on: 
    workflow_dispatch:
        inputs:
            client:
                description: 'Client to deploy to (must match GitHub Environment name)'
                required: true
                type: string

jobs:
    deploy:
      runs-on: ubuntu-latest
      environment: ${{ inputs.client }}
      permissions:
          id-token: write
          contents: read
      steps:
          - name: Checkout Repo
            uses: actions/checkout@v5
            
          - name: Login to Azure
            uses: azure/login@v3
            with:
              client-id: ${{ vars.AZURE_CLIENT_ID }}
              tenant-id: ${{ vars.AZURE_TENANT_ID }}
              subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

          - name: Deploy LAW
            run: |
              az deployment group create \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --template-file infrastructure/Log-Analytics-Workspace-Sentinel/Log-Analytics-Workspace.bicep \
              --parameters infrastructure/Log-Analytics-Workspace-Sentinel/parameters/${{ inputs.client }}.bicepparam
