name: Deploy Log Analytics Workspace and Sentinel

on: 
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - 'infrastructure/Log-Analytics-Workspace-Sentinel/**.bicep'

jobs:
    deploy:
      runs-on:
          - ubuntu-latest

      steps:
          - name: Checkout Repo
            uses: actions/checkout@v6
            
          - name: Login to Azure
            uses: azure/login@v3
            with:
                creds: ${{ secrets.AZURE_CREDENTIALS }}

          - name: Deploy LAW
            if: github.event_name == 'workflow_dispatch'
            run: |
              for file in infrastructure/Log-Analytics-Workspace-Sentinel/*.bicep; do
                echo "Deploying $file"
                az deployment group create \
                --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
                --template-file "$file" 
              done
